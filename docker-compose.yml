version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "3023:3023"
    environment:
      # You can override these variables when running on the live server
      - DB_HOST=192.168.4.10
      - DB_PORT=5432
      - DB_NAME=sacco
      - DB_USER=postgres
      - DB_PASSWORD=legacy#007
    restart: unless-stopped
