<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="log.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2c48" />
  <meta name="description" content="Metro Sacco Member Portal - Manage your shares, loans, and dividends" />
  <link rel="apple-touch-icon" href="log.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Metro Sacco | Member Portal</title>
  <style>
    /* Minimal base styles to ensure proper rendering while keeping the original structure */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #root {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Portal container styling (enhances the UI but keeps all original content intact) */
    .metro-portal {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <!-- React Dashboard component will be rendered here -->
  </div>
</body>
</html>
